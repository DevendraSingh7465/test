<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body,html{
            background-color: #212121;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
        }
        span{
            color: white;
        }
        .card {
        width: 190px;
        height: 254px;
        transition: all 0.2s;
        position: relative;
        cursor: pointer;
        }

        .card-inner {
        width: inherit;
        height: inherit;
        background: rgba(255,255,255,.05);
        box-shadow: 0 0 10px rgba(24, 20, 20, 0.987);
        backdrop-filter: blur(10px);
        border-radius: 8px;
        text-align: center;
        }

        .card:hover {
        transform: scale(1.04) rotate(1deg);
        }

        .circle {
        width: 100px;
        height: 100px;
        background: radial-gradient(#b0e633, #53ef7d);
        border-radius: 50%;
        position: absolute;
        animation: move-up6 2s ease-in infinite alternate-reverse;
        }

        .circle:nth-child(1) {
        top: -25px;
        left: -25px;
        }

        .circle:nth-child(2) {
        bottom: -25px;
        right: -25px;
        animation-name: move-down1;
        }

        @keyframes move-up6 {
        to {
            transform: translateY(-10px);
        }
        }

        @keyframes move-down1 {
        to {
            transform: translateY(10px);
        }
        }

    </style>
</head>
<body>
    
    <div class="outer">
        <div class="card">
<!--             <div class="circle"></div>
            <div class="circle"></div> -->
            <div class="card-inner"><span>Registration Done!<br><br>
                Lorem ipsum dolor sit amet consectetur adipisicing elit. Iste inventore sed veritatis. Tempora expedita voluptate perspiciatis praesentium porro consectetur! Perferendis similique dicta neque. Fuga, architecto dolor in officiis quidem placeat.
            </span></div>
        </div>
    </div>
</body>
</html>
